<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pawlendar | Edit Staff</title>

    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="admin-staff-form.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body data-active-nav="staff">

<div id="app" style="display:none;">

    <header class="navbar">

        <a href="admin-dashboard.html" class="brand brand-dark">

            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">

                <ellipse cx="15" cy="18" rx="6.5" ry="5.5" fill="var(--clay)" />
                <circle cx="8.5" cy="9.5" r="3" fill="var(--clay)" />
                <circle cx="15" cy="6.5" r="3" fill="var(--clay)" />
                <circle cx="21.5" cy="9.5" r="3" fill="var(--clay)" />

            </svg>

            <span>Pawlendar</span>

        </a>

        <nav class="nav-list">

            <a href="admin-dashboard.html">
                Dashboard
            </a>

            <a href="admin-appointment.html">
                Appointments
            </a>

            <a href="admin-calendar.html">
                Calendar
            </a>

            <a href="admin-services.html">
                Services
            </a>

            <a href="admin-staff.html" class="active">
                Staff
            </a>

        </nav>

        <div class="nav-auth">

            <a
                href="#"
                id="logoutBtn"
                class="btn-ghost-small">

                Logout

            </a>

        </div>

    </header>

    <main class="dashboard-layout">

        <section class="content-panel">

            <div class="content-wrapper">

                <header class="dashboard-header">

                    <h1>Edit Staff</h1>

                    <p>
                        Update the groomer's information and weekly working schedule.
                    </p>

                </header>

                <hr>

                <form id="staffEditForm">

                    <!-- BASIC INFORMATION -->

                    <div class="form-row two-columns">

                        <div class="input-group">

                            <label for="first_name">
                                First Name
                            </label>

                            <input
                                type="text"
                                id="first_name"
                                required>

                        </div>

                        <div class="input-group">

                            <label for="last_name">
                                Last Name
                            </label>

                            <input
                                type="text"
                                id="last_name"
                                required>

                        </div>

                    </div>

                    <div class="form-row two-columns">

                        <div class="input-group">

                            <label for="email">
                                Email
                            </label>

                            <input
                                type="email"
                                id="email">

                        </div>

                        <div class="input-group">

                            <label for="phone_number">
                                Phone Number
                            </label>

                            <input
                                type="tel"
                                id="phone_number"
                                maxlength="15"
                                required>

                        </div>

                    </div>

                    <div class="form-row two-columns">

                        <div class="input-group">

                            <label for="specialization">
                                Specialization
                            </label>

                            <input
                                type="text"
                                id="specialization"
                                required>

                        </div>

                        <div class="input-group">

                            <label for="hire_date">
                                Hire Date
                            </label>

                            <input
                                type="date"
                                id="hire_date"
                                required>

                        </div>

                    </div>

                    <p
                        id="formError"
                        class="form-error"
                        style="display:none;">
                    </p>

                    <hr>

                    <!-- WEEKLY AVAILABILITY -->

                    <div class="availability-section">

                        <h2>Weekly Availability</h2>

                        <p class="availability-note">
                            Update the groomer's regular working schedule.
                        </p>

                        <div class="availability-table">

                            <div class="availability-header">

                                <span>Day</span>
                                <span>Available</span>
                                <span>Start</span>
                                <span>End</span>

                            </div>

                            <div class="availability-row">
                                <span>Monday</span>
                                <input type="checkbox" id="monday">
                                <input type="time" id="mondayStart">
                                <input type="time" id="mondayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Tuesday</span>
                                <input type="checkbox" id="tuesday">
                                <input type="time" id="tuesdayStart">
                                <input type="time" id="tuesdayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Wednesday</span>
                                <input type="checkbox" id="wednesday">
                                <input type="time" id="wednesdayStart">
                                <input type="time" id="wednesdayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Thursday</span>
                                <input type="checkbox" id="thursday">
                                <input type="time" id="thursdayStart">
                                <input type="time" id="thursdayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Friday</span>
                                <input type="checkbox" id="friday">
                                <input type="time" id="fridayStart">
                                <input type="time" id="fridayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Saturday</span>
                                <input type="checkbox" id="saturday">
                                <input type="time" id="saturdayStart">
                                <input type="time" id="saturdayEnd">
                            </div>

                            <div class="availability-row">
                                <span>Sunday</span>
                                <input type="checkbox" id="sunday">
                                <input type="time" id="sundayStart">
                                <input type="time" id="sundayEnd">
                            </div>

                        </div>

                    </div>

                    <div class="panel-buttons">

                        <a
                            href="admin-staff.html"
                            class="outline-btn">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="main-btn">

                            Update Staff

                        </button>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

<script src="admin-staff-form-edit.js"></script>

</body>

</html>
